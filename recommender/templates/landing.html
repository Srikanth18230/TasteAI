{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>TasteAI</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#fff8f0;
        }

        nav{
            background:#ff8c00;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            color:white;
            margin:0;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .hero{
            text-align:center;
            padding:80px;
        }

        .hero img{
            width:320px;
            border-radius:20px;
        }

        h1{
            color:#ff8c00;
            font-size:48px;
        }

        p{
            font-size:22px;
            color:#555;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:15px 35px;
            background:#ff8c00;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-size:20px;
        }

        .features{
            display:flex;
            justify-content:center;
            gap:40px;
            margin:60px;
        }

        .box{
            width:250px;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
            text-align:center;
        }
    </style>
</head>

<body>

<nav>
    <h2>TasteAI</h2>

    <div>
        <a href="/">Home</a>
        <a href="/menu/">Menu</a>
    </div>
</nav>

<div class="hero">

    <img src="{% static 'image/biryani.jpg' %}">

    <h1>Welcome to TasteAI</h1>

    <p>AI Powered Food Recommendation System</p>

    <a href="/menu/" class="btn">Explore Menu</a>

</div>

<div class="features">

<div class="box">
<h3>🍔 Delicious Food</h3>
<p>Fresh and tasty meals.</p>
</div>

<div class="box">
<h3>🤖 AI Recommendation</h3>
<p>Smart food suggestions.</p>
</div>

<div class="box">
<h3>⚡ Fast Ordering</h3>
<p>Simple ordering process.</p>
</div>

</div>

</body>
</html>
