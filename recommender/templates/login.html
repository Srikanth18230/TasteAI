<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff8c00,#ffb347);
}

.login{
    width:350px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#ff8c00;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
}

</style>

</head>

<body>

<div class="login">

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
